services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: businessassistant-postgres
    environment:
      # Importante: el user 'app' no debe ser superuser en prod/ci.
      # Usamos el usuario default 'postgres' para bootstrap y creamos el rol app via init script.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-businessassistant}
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: businessassistant-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    image: businessassistant-api:local
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/businessassistant
      RUN_MIGRATIONS_ON_START: "1"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["true"]

  api:
    image: businessassistant-api:local
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql://app:app@postgres:5432/businessassistant
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      RUN_MIGRATIONS_ON_START: "0"
      READINESS_TENANT_ID: ${READINESS_TENANT_ID:-00000000-0000-0000-0000-000000000000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/readyz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  worker:
    image: businessassistant-worker:local
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql://app:app@postgres:5432/businessassistant
      RUN_MIGRATIONS_ON_START: "0"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
