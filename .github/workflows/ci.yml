name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: |
          ruff check .

  unit:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          pytest -q -m "not integration"

  integration:
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: businessassistant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d businessassistant"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/businessassistant
      APP_ENV: ci
      JWT_SECRET: ci-secret
      READINESS_TENANT_ID: 00000000-0000-0000-0000-000000000000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Apply migrations
        run: |
          alembic upgrade head

      - name: Run integration tests
        run: |
          pytest -q

      - name: Smoke test (API health/ready)
        run: |
          python -m uvicorn apps.api.asgi:app --host 127.0.0.1 --port 8000 &
          API_PID=$!
          # espera a que levante
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/healthz
          curl -fsS http://127.0.0.1:8000/readyz
          kill $API_PID
